name: CounterApp
options:
  bundleIdPrefix: com.amitrajoriya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
settings:
  SWIFT_VERSION: "5.9"
targets:
  CounterApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CounterApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.amitrajoriya.CounterApp
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_EMIT_LOC_STRINGS: YES
  CounterAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CounterAppTests
    dependencies:
      - target: CounterApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.amitrajoriya.CounterAppTests
      GENERATE_INFOPLIST_FILE: YES
